<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Troncoso Designs — Catálogo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="img/Logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="brand-block">
        <img src="img/Logo.svg" alt="Troncoso Designs Logo" class="brand-logo" />
        <div>
          <div class="brand-name">Catalogo de productos</div> 
          <!-- <div class="brand-sub">Catálogo de Productos</div> -->
        </div>
      </div>

      <div class="header-badge">Personalizado</div>
      <a href="https://www.instagram.com/troncosodesigns/" 
        target="_blank" 
        rel="noopener noreferrer" 
        class="qr-instagram-container">
    <img src="img/troncosodesigns_qr.png" alt="Instagram QR Troncoso Designs" class="qr-image">
      </a>
    </div>
  </header>

  <!-- FILTROS -->
  <nav class="filter-bar">
    <button class="filter-btn active" data-cat="all">Todos</button>
    <button class="filter-btn" data-cat="tumbler">Tumblers</button>
    <button class="filter-btn" data-cat="mug">Tazas</button>
    <button class="filter-btn" data-cat="shirt">Ropa</button>
    <button class="filter-btn" data-cat="sticker">Stickers</button>
    <button class="filter-btn" data-cat="keychain">Llaveros</button>
    <button class="filter-btn" data-cat="bottle">Botellas</button>
    <button class="filter-btn" data-cat="props">Accesorios</button>
  </nav>

  <!-- CONTENIDO -->
  <main>
    <div class="section-header">
      <div class="section-title">Productos</div>
      <div class="section-line"></div>
      <div class="count-pill" id="js-count"></div>
    </div>
    <div class="grid" id="js-grid"></div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span id="js-footer"></span>
  </footer>

  <!-- MODAL -->
  <div class="modal-overlay" id="js-modal">
    <div class="modal-box">
      <button class="modal-close" id="js-modal-close">&times;</button>
      <div class="modal-img-wrap">
        <img class="modal-img" id="modal-img" src="" alt="" />
      </div>
      <div class="modal-body">
        <div class="modal-category" id="modal-cat"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-desc" id="modal-desc"></div>
        <div class="modal-footer">
          <span class="modal-price" id="modal-price"></span>
          <a class="modal-wa-btn" id="modal-wa-btn" href="#" target="_blank" rel="noopener">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.554 4.117 1.523 5.845L.057 23.885a.5.5 0 0 0 .633.62l6.195-1.623A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.94 9.94 0 0 1-5.062-1.38l-.361-.215-3.735.979.996-3.644-.237-.376A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
            </svg>
            Pedir por WhatsApp
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
