<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Troncoso Designs — Catálogo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="img/Logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="brand-block">
        <img src="img/Logo.svg" alt="Troncoso Designs Logo" class="brand-logo" />
        <div>
          <div class="brand-name">Catalogo de productos</div> 
          <!-- <div class="brand-sub">Catálogo de Productos</div> -->
        </div>
      </div>
      <button class="header-badge" id="js-contact-btn" style="background:transparent; cursor:pointer;">Contacto</button>
    </div>
  </header>

  <!-- FILTROS -->
  <nav class="filter-bar">
    <button class="filter-btn active" data-cat="all">Todos</button>
    <button class="filter-btn" data-cat="tumbler">Tumblers</button>
    <button class="filter-btn" data-cat="mug">Tazas</button>
    <button class="filter-btn" data-cat="shirt">Ropa</button>
    <button class="filter-btn" data-cat="sticker">Stickers</button>
    <button class="filter-btn" data-cat="keychain">Llaveros</button>
    <button class="filter-btn" data-cat="bottle">Botellas</button>
    <button class="filter-btn" data-cat="props">Accesorios</button>
  </nav>

  <!-- CONTENIDO -->
  <main>
    <div class="section-header">
      <div class="section-title">Productos</div>
      <div class="section-line"></div>
      <div class="count-pill" id="js-count"></div>
    </div>
    <div class="grid" id="js-grid"></div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span id="js-footer"></span>
  </footer>

  <!-- MODAL -->
  <div class="modal-overlay" id="js-modal">
    <div class="modal-box">
      <button class="modal-close" id="js-modal-close">&times;</button>
      <div class="modal-img-wrap">
        <img class="modal-img" id="modal-img" src="" alt="" />
      </div>
      <div class="modal-body">
        <div class="modal-category" id="modal-cat"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-desc" id="modal-desc"></div>
        <div class="modal-footer">
          <span class="modal-price" id="modal-price"></span>
          <a class="modal-wa-btn" id="modal-wa-btn" href="#" target="_blank" rel="noopener">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.554 4.117 1.523 5.845L.057 23.885a.5.5 0 0 0 .633.62l6.195-1.623A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.94 9.94 0 0 1-5.062-1.38l-.361-.215-3.735.979.996-3.644-.237-.376A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
            </svg>
            Pedir por WhatsApp
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL CONTACTO -->
  <div class="modal-overlay" id="js-modal-contact">
    <div class="modal-box">
      <button class="modal-close" id="js-modal-contact-close">&times;</button>
      <div class="modal-img-wrap">
        <a href="https://www.instagram.com/troncosodesigns/" target="_blank" title="Visitar Instagram">
          <img class="modal-img" src="img/QR.png" alt="QR Contacto" style="cursor: pointer;" />
        </a>
      </div>
      <div class="modal-body">
        <div class="modal-category">Información</div>
        <div class="modal-name">Troncoso Designs</div>
        <div class="modal-desc">
          <strong>Dirección:</strong><br>
          Calle 1 #77, Lotes y servicios, Sabana Perdida, SDN.<br><br>
          <strong>Teléfonos:</strong><br>
          829-420-3240<br>
          809-708-3063<br><br>
          <strong>Instagram:</strong><br>
          <a href="https://www.instagram.com/troncosodesigns/" target="_blank" class="contact-social-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.791-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.209-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"></path></svg>
            @troncosodesigns
          </a>
          <br><br>
          <em style="color: var(--accent); font-weight: 500;">HECHO CON AM❤️R</em>
        </div>
      </div>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
